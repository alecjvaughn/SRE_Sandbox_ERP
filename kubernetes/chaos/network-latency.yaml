
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: inventory-service-network-delay
  namespace: default
spec:
  action: delay
  mode: all
  selector:
    labelSelectors:
      app.kubernetes.io/name: inventory-service
  delay:
    latency: "500ms"
    correlation: "100"
    jitter: "0ms"
  direction: to
  target:
    selector:
      namespaces:
        - confluent
      labelSelectors:
        platform.confluent.io/type: kafka
    mode: all
  duration: '2m'
