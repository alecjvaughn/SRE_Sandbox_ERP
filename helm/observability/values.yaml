# Values for kube-prometheus-stack

kube-prometheus-stack:
  grafana:
    enabled: true
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        external-dns.alpha.kubernetes.io/hostname: grafana.aleclabs.us
      hosts:
        - grafana.aleclabs.us
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"

  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
