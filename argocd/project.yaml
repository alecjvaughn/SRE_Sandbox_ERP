apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: sre-sandbox
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "SRE Sandbox Project"
  sourceRepos:
    - "https://github.com/alecjvaughn/SRE_Sandbox_ERP.git"
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
